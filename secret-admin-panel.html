<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Salami Admin</title>
    <style>
        :root { --primary-green: #0b4a26; --accent-gold: #f4b41a; --text-dark: #1a1a1a; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #111; color: var(--text-dark); padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 1000px; }
        
        #loginScreen { background: #222; padding: 40px; border-radius: 12px; border-top: 5px solid var(--accent-gold); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; margin: 0 auto; text-align: center; color: white; }
        #loginScreen h2 { color: var(--accent-gold); margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; background: #fff; color: #111; }
        #loginScreen input { background: #333; color: white; border: none;}
        
        button { background-color: var(--accent-gold); color: #111; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #fff; transform: scale(1.02); }
        
        #adminDashboard { display: none; background: #f9f9f9; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #ddd; padding-bottom: 15px;}
        .header h1 { color: var(--primary-green); }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; font-size: 0.95rem; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background-color: var(--primary-green); color: white; }
        
        .btn-status { background-color: #3498db; color: white; font-size: 0.85rem; padding: 6px 10px; margin-right: 5px; }
        .btn-edit { background-color: #f39c12; color: white; font-size: 0.85rem; padding: 6px 10px; margin-right: 5px; }
        .btn-delete { background-color: #e74c3c; color: white; font-size: 0.85rem; padding: 6px 10px; }
        
        .status-badge { padding: 5px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .status-pending { background-color: #ffeaa7; color: #d35400; }
        .status-paid { background-color: #55efc4; color: #00b894; }

        /* Edit Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 90%; max-width: 400px; text-align: left; }
    </style>
</head>
<body>

    <div class="container">
        <div id="loginScreen">
            <h2>🔒 Restricted Access</h2>
            <input type="text" id="username" placeholder="Admin ID">
            <input type="password" id="password" placeholder="Passcode">
            <button onclick="login()">Access Database</button>
            <p id="loginError" style="color: #ff4757; margin-top: 15px; display: none; font-weight: bold;">Access Denied!</p>
        </div>

        <div id="adminDashboard">
            <div class="header">
                <h1>🛠️ Live Firebase Database</h1>
                <button onclick="logout()" style="background-color: #333; color: white;">Lock Panel</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Name</th><th>Amount</th><th>Phone</th><th>Status</th><th>Actions</th>
                    </tr>
                </thead>
                <tbody id="dataTable">
                    <tr><td colspan="5" style="text-align:center;">Waiting for database sync...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h2 style="color: var(--primary-green); margin-bottom: 20px;">Edit Request</h2>
            <input type="hidden" id="editDocId">
            <label>Name</label><input type="text" id="editName">
            <label>Amount (৳)</label><input type="number" id="editAmount">
            <label>Method</label>
            <select id="editMethod">
                <option value="bKash">bKash</option>
                <option value="Nagad">Nagad</option>
            </select>
            <label>Phone</label><input type="text" id="editPhone">
            
            <button onclick="saveEdit()" style="width: 100%; margin-bottom: 10px;">Save Changes</button>
            <button onclick="closeEditModal()" style="width: 100%; background-color: #ccc;">Cancel</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getFirestore, collection, onSnapshot, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCWAj7EsgGUqaymkpPkq3VivGo9iMLlR5A",
            authDomain: "eid-salami-wheel-ea2e3.firebaseapp.com",
            projectId: "eid-salami-wheel-ea2e3",
            storageBucket: "eid-salami-wheel-ea2e3.firebasestorage.app",
            messagingSenderId: "956265999445",
            appId: "1:956265999445:web:f7ba7a6bee0ee2e1c678dc"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        // We store the live records here globally to easily edit them later
        let adminRecords = {};

        window.login = () => {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === 'admin' && pass === 'boss') {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('adminDashboard').style.display = 'block';
                document.body.style.backgroundColor = '#e0f2f1';
                startLiveSync(); 
            } else {
                document.getElementById('loginError').style.display = 'block';
            }
        };

        window.logout = () => location.reload();

        function startLiveSync() {
            const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const table = document.getElementById('dataTable');
                if (snapshot.empty) {
                    table.innerHTML = "<tr><td colspan='5' style='text-align:center;'>No salami requests yet.</td></tr>";
                    return;
                }
                
                table.innerHTML = "";
                adminRecords = {}; // clear old records
                
                snapshot.forEach((firebaseDoc) => {
                    const req = firebaseDoc.data();
                    const docId = firebaseDoc.id;
                    const status = req.status || 'pending'; // fallback if old records exist
                    
                    adminRecords[docId] = req; // save to global object

                    const statusBadge = status === 'paid' 
                        ? `<span class="status-badge status-paid">PAID ✅</span>` 
                        : `<span class="status-badge status-pending">PENDING ⏳</span>`;

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td><strong>${req.name}</strong></td>
                        <td style="color: var(--primary-green); font-weight: bold;">${req.amount}৳</td>
                        <td>${req.method}<br><small style="color: #666;">${req.phone}</small></td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-status" onclick="toggleStatus('${docId}', '${status}')">
                                ${status === 'pending' ? 'Mark Paid' : 'Mark Pending'}
                            </button>
                            <button class="btn-edit" onclick="openEditModal('${docId}')">Edit</button>
                            <button class="btn-delete" onclick="deleteRecord('${docId}')">Delete</button>
                        </td>
                    `;
                    table.appendChild(row);
                });
            });
        }

        // --- ADMIN ACTIONS ---
        
        window.toggleStatus = async (docId, currentStatus) => {
            const newStatus = currentStatus === 'pending' ? 'paid' : 'pending';
            await updateDoc(doc(db, "requests", docId), { status: newStatus });
        };

        window.deleteRecord = async (docId) => {
            if(confirm("Delete this winner permanently from the cloud?")) {
                await deleteDoc(doc(db, "requests", docId));
            }
        };

        // --- EDIT MODAL LOGIC ---
        
        window.openEditModal = (docId) => {
            const req = adminRecords[docId];
            document.getElementById('editDocId').value = docId;
            document.getElementById('editName').value = req.name;
            document.getElementById('editAmount').value = req.amount;
            document.getElementById('editMethod').value = req.method;
            document.getElementById('editPhone').value = req.phone;
            
            document.getElementById('editModal').style.display = 'flex';
        };

        window.closeEditModal = () => {
            document.getElementById('editModal').style.display = 'none';
        };

        window.saveEdit = async () => {
            const docId = document.getElementById('editDocId').value;
            await updateDoc(doc(db, "requests", docId), {
                name: document.getElementById('editName').value,
                amount: parseInt(document.getElementById('editAmount').value),
                method: document.getElementById('editMethod').value,
                phone: document.getElementById('editPhone').value
            });
            closeEditModal();
        };
    </script>
</body>
</html>
